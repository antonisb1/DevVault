services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: devvault
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - devvault_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d devvault"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env.example
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '8000:8000'
    restart: on-failure

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - '5173:80'

volumes:
  devvault_postgres:
